name: Vote - CI Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'release/**'
      - 'hotfix/**'
    paths:
      - 'vote/**'
      - '.github/workflows/vote-ci.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'vote/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/vote

jobs:
  # ── Stage 1: Test ──────────────────────────────────────────────────────────
  test:
    name: Test (Maven)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        run: mvn test -B --no-transfer-progress
        working-directory: vote

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vote-test-report
          path: vote/target/surefire-reports/
          retention-days: 7

  # ── Stage 2: Build & Push ──────────────────────────────────────────────────
  build-push:
    name: Build & Push Image
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      full-image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: vote
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Stage 3: Trigger Infra Repo (GitOps) ──────────────────────────────────
  # El repo de infraestructura (microservices-demo-infra) recibe el evento
  # y hace el deploy al ambiente correspondiente.
  trigger-infra:
    name: Trigger Infra Deployment
    needs: build-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_OUTPUT
          else
            echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop" >> $GITHUB_OUTPUT
          fi

      - name: Dispatch deployment to infra repo
        continue-on-error: true
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          repository: ${{ github.repository_owner }}/microservices-demo-infra
          event-type: vote-image-updated
          client-payload: |
            {
              "image": "${{ steps.tag.outputs.image }}",
              "sha": "${{ github.sha }}",
              "branch": "${{ github.ref_name }}",
              "triggered_by": "vote-ci"
            }
